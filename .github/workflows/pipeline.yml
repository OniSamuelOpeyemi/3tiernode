name: CI/CD Pipeline

on:
  push:
    branches: 
      - main
      - deployment
      - test

  pull_request:
    branches: [main]

  workflow_dispatch:

env:
  AWS_REGION:      us-east-1
  ECR_WEB_REPO:    ${{ secrets.ECR_WEB_REPO }}   # node3tier-prod-web-repo
  ECR_API_REPO:    ${{ secrets.ECR_API_REPO }}
  ECS_CLUSTER:     ${{ secrets.ECS_CLUSTER }}     # node3tier-prod-cluster
  WEB_SERVICE:     ${{ secrets.WEB_SERVICE }}     # node3tier-prod-web-svc
  API_SERVICE:     ${{ secrets.API_SERVICE }}     # node3tier-prod-api-svc
  WEB_TASK_FAMILY: ${{ secrets.WEB_TASK_FAMILY }}
  API_TASK_FAMILY: ${{ secrets.API_TASK_FAMILY }}

jobs:
  # Test 
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: rootpassword
          POSTGRES_DB: testdb
        ports: ["5432:5432"]

        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: |
            web/package-lock.json
            api/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Install api dependencies
        working-directory: api
        run: npm ci

      - name: Run web unit tests
        working-directory: web
        run: npm test
        env:
          CI: true

      - name: Run api unit tests
        working-directory: api
        run: npm test
        env:
          CI: true
          DBHOST: 127.0.0.1
          DBPORT: 5432
          DB: testdb
          DBUSER: postgres
          DBPASS: rootpassword

      - name: Run api integration tests
        working-directory: api
        run: npm run test:integration
        env:
          CI: true
          DBHOST: 127.0.0.1
          DBPORT: 5432
          DB: testdb
          DBUSER: postgres
          DBPASS: rootpassword

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          fail_ci_if_error: false

  # Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: |
            web/package-lock.json
            api/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Install api dependencies
        working-directory: api
        run: npm ci

      - name: Run npm audit (web)
        working-directory: web
        run: npm audit --audit-level=high || true  # true to prevent CI failure, but will report issues (to unblock PRs)

      - name: Run npm audit (api)
        working-directory: api
        run: npm audit --audit-level=high || true

      - name: Run Snyk scan for web
        if: ${{ secrets.SNYK_TOKEN != '' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        working-directory: web
        run: |
          npm install -g snyk
          snyk auth $SNYK_TOKEN
          snyk test --severity-threshold=high

      - name: Run Snyk scan for api
        if: ${{ secrets.SNYK_TOKEN != '' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        working-directory: api
        run: |
          npm install -g snyk
          snyk auth $SNYK_TOKEN
          snyk test --severity-threshold=high

    #  - name: Run SonarQube analysis
    #    if: ${{ secrets.SONAR_TOKEN != '' && secrets.SONAR_HOST_URL != '' && secrets.SONAR_PROJECT_KEY != '' }}
    #    env:
    #      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    #      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    #      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
    #      SONAR_PROJECT_NAME: ${{ secrets.SONAR_PROJECT_NAME }}
    #    run: |
    #      npm install -g sonar-scanner
     #     sonar-scanner \
     #       -Dsonar.projectKey=$SONAR_PROJECT_KEY \
     #       -Dsonar.projectName="$SONAR_PROJECT_NAME" \
     #       -Dsonar.sources=api,web \
     #       -Dsonar.host.url=$SONAR_HOST_URL \
     #       -Dsonar.login=$SONAR_TOKEN \
     #       -Dsonar.sourceEncoding=UTF-8 \
     #       -Dsonar.exclusions=**/node_modules/**,**/test/**

      - name: Run Trivy vulnerability scan (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"
          ignore-unfixed: true

  # Build & Push Docker Images
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/deployment')
    outputs:
      web_image: ${{ steps.web_meta.outputs.tags }}
      api_image: ${{ steps.api_meta.outputs.tags }}
      image_tag: ${{ steps.set_tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: set_tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login_ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push web image
        id: web_meta
        uses: docker/build-push-action@v5
        with:
          context:   ./web
          file:      ./web/Dockerfile
          push:      true
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          tags: |
            ${{ env.ECR_WEB_REPO }}:${{ steps.set_tag.outputs.tag }}
            ${{ env.ECR_WEB_REPO }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Build & push api image
        id: api_meta
        uses: docker/build-push-action@v5
        with:
          context:   ./api
          file:      ./api/Dockerfile
          push:      true
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          tags: |
            ${{ env.ECR_API_REPO }}:${{ steps.set_tag.outputs.tag }}
            ${{ env.ECR_API_REPO }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Scan web image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.ECR_WEB_REPO }}:${{ steps.set_tag.outputs.tag }}"
          severity:  "CRITICAL"
          exit-code: "1"

      - name: Scan api image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.ECR_API_REPO }}:${{ steps.set_tag.outputs.tag }}"
          severity:  "CRITICAL"
          exit-code: "1"

  # ── 4. Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ECS (Rolling)
    runs-on: ubuntu-latest
    needs: build
    environment: production   # Requires manual approval in GitHub Environment settings

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── Deploy web service ──────────────────────────────────────────────────
      - name: Download current web task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.WEB_TASK_FAMILY }} \
            --query taskDefinition > /tmp/web-task-def.json

      - name: Update web task definition with new image
        id: web_task_def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  /tmp/web-task-def.json
          container-name:   web
          image:            ${{ env.ECR_WEB_REPO }}:${{ needs.build.outputs.image_tag }}

      - name: Deploy web service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:           ${{ steps.web_task_def.outputs.task-definition }}
          service:                   ${{ env.WEB_SERVICE }}
          cluster:                   ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes:          10
          force-new-deployment:      true

      # Deploy api service 
      - name: Download current api task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.API_TASK_FAMILY }} \
            --query taskDefinition > /tmp/api-task-def.json

      - name: Update api task definition with new image
        id: api_task_def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  /tmp/api-task-def.json
          container-name:   api
          image:            ${{ env.ECR_API_REPO }}:${{ needs.build.outputs.image_tag }}

      - name: Deploy api service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:           ${{ steps.api_task_def.outputs.task-definition }}
          service:                   ${{ env.API_SERVICE }}
          cluster:                   ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes:          10
          force-new-deployment:      true

      # ── Post-deploy smoke test ──────────────────────────────────────────────
      - name: Smoke test web
        run: |
          CF_URL="${{ secrets.CLOUDFRONT_WEB_DOMAIN }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$CF_URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "Web smoke test FAILED (HTTP $STATUS)"
            exit 1
          fi
          echo "Web smoke test PASSED"

      - name: Smoke test api
        run: |
          CF_URL="${{ secrets.CLOUDFRONT_API_DOMAIN }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$CF_URL/health")
          if [ "$STATUS" != "200" ]; then
            echo "API smoke test FAILED (HTTP $STATUS)"
            exit 1
          fi
          echo "API smoke test PASSED"

      - name: Notify deployment success
        if: success()
        run: |
          echo "Deployment successful: SHA ${{ github.sha }}"
          # Add Slack/Teams webhook notification here if needed
