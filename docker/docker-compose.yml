# version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${DBUSER:-postgres}
      POSTGRES_PASSWORD: ${DBPASS:-rootpassword}
      POSTGRES_DB: ${DB:-testdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DBPORT:-5432}:5432"

  api:
    build:
      context: ../
      dockerfile: Container/Dockerfile.api
    restart: always
    env_file:
      - .env               # Loads all your variables from .env
    environment:
      # Map your .env vars to the API's expected variables
      DBUSER: ${DBUSER}
      DB: ${DB}
      DBPASS: ${DBPASS}
      DBPORT: ${DBPORT:-5432}
      DBHOST: db
    ports:
      - "3000:3000"           # Expose API on port 3000
    depends_on:
      - db                    # Ensure API starts after DB

  web:
    build:
      context: ../
      dockerfile: Container/Dockerfile.web
    restart: always
    env_file:
      - .env               # Loads all your variables from .env
    environment:
      # Map your .env vars to the web's expected variables
      API_HOST: http://api:3000  # Use the internal Docker network to connect to the API service
      PORT: 3000
      DBUSER: ${DBUSER}
      DB: ${DB}
      DBPASS: ${DBPASS}
      DBPORT: ${DBPORT:-5432}
      DBHOST: db
    ports:
      - "3002:3000"           # Expose Web on port 3002
    depends_on:
      - api

volumes:
  postgres_data:
